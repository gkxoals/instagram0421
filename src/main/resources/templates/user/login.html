<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel ="stylesheet" href="/css/User.css">
</head>
<body>

<form action="/user/login" method="post">
    <div th:if="${param.error}">
        <div>
            사용자 이메일 또는 비밀번호를 확인해 주세요.
        </div>
    </div>
    <div>
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required autocomplete="off">
    </div>
    <div>
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="off">
    </div>

    <button type="submit">로그인</button>
    <div>
        <p>아직 계정이 없으신가요?</p>
        <a href="signup">회원가입</a>
    </div>
</form>
</body>
</html>
