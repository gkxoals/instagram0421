<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${profile.nickname} + '님의 Instagram'">프로필</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/profile.css">

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/profile.js"></script>


</head>
<body>

<!-- ✅ 왼쪽 사이드바 -->
<div th:replace="layout/sidebar :: sidebar"></div>

<main class="main-feed profile-page">

    <!-- ✅ 프로필 상단 -->
    <section class="profile-header">
        <div class="profile-image-wrapper">
            <img class="profile-image"
                 th:src="${profile.profileImage != null ? profile.profileImage : '/images/default-profile.png'}"
                 alt="프로필 이미지">
        </div>

        <div class="profile-info">
            <div class="top-row">
                <h2 class="username" th:text="${profile.nickname}">닉네임</h2>
                <th:block th:if="${isOwner}">
                    <a th:href="@{/profile/profile-edit}" class="btn">프로필 편집</a>
                </th:block>
                <th:block th:unless="${isOwner}">
                    <button class="btn follow-btn" th:data-user-id="${profile.userId}">팔로우</button>
                </th:block>
            </div>

            <ul class="profile-stats">
                <!-- <li><strong th:text="${profile.postCount}">0</strong> 게시물</li>-->
                <li><strong>0</strong> 게시물</li>
                <li><strong>0</strong> 팔로워</li>
                <li><strong>0</strong> 팔로우</li>
            </ul>

            <div class="bio">
                <p class="nickname" th:text="${profile.nickname}">닉네임</p>
                <p class="bio-text" th:text="${profile.bio}">소개글 없음</p>
            </div>
        </div>
    </section>

    <!-- ✅ 탭 -->
    <section class="profile-tabs">
        <div class="tab active">게시물</div>
        <div class="tab disabled">저장됨</div>
        <div class="tab disabled">태그됨</div>
    </section>

    <!-- ✅ 게시물 영역 -->
    <section class="post-list">

        <th:block th:if="${#lists.isEmpty(posts)}">
            <div class="no-posts">
                <p class="no-posts-title">사진 공유</p>
                <p class="no-posts-desc">사진을 공유하면 회원님의 프로필에 표시됩니다.</p>
                <th:block th:if="${isOwner}">
                    <a href="/post/create" class="upload-link">첫 사진 공유하기</a>
                </th:block>
            </div>
        </th:block>

        <!-- 게시물 그리드 -->
        <div class="post-grid" th:unless="${#lists.isEmpty(posts)}">
            <div class="post-item" th:each="post : ${posts}" th:attr="data-post-id=${post.id}">
                <img th:src="${post.thumbnailUrl}" alt="게시물 썸네일" class="thumbnail-img">
            </div>
        </div>

        <!-- 모달 -->
        <div id="postModal" class="modal hidden">
            <div class="modal-content">
                <span class="close-button" onclick="closeModal()">&times;</span>
                <div id="modalContentArea"></div>
            </div>
        </div>

    </section>

</main>

</body>
</html>
