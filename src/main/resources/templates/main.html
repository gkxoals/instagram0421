<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="/icon/headLogo.png" type="image/x-icon">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="/css/main.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="/js/main.js"></script>
</head>
<body>

<div th:replace="layout/sidebar :: sidebar"></div>
<div th:replace="layout/mobile-nav :: mobile-nav"></div>
<div th:replace="layout/notifications :: notificationList"></div>



<main class="main-feed">
    <div class="post-container">
        <p>추천 게시물</p>

        <div th:each="post : ${posts}" class="post">
            <div class="post-header">
                <div id="set">
                    <img th:src="${post.profileImage}" alt="프로필 이미지" class="profile-img">
                    <span th:text="${post.nickname}" style="font-weight: bold;"></span>
                </div>

                <div class="edit-delete" th:if="${loggedInUser != null and loggedInUser.userId == post.user.id}">
                    <button><a th:href="@{/posts/edit/{id}(id=${post.id})}">수정</a></button>
                    <form th:action="@{/posts/delete/{id}(id=${post.id})}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                    </form>
                </div>
            </div>

            <div th:if="${post.imageUrl != null}">
                <img th:src="${post.imageUrl}" alt="게시물 이미지" class="post-image"/>
            </div>

            <p th:text="${post.content}"></p>
            <p class="post-date" th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}"></p>

            <div class="post-actions">
                <div class="post-actions">
                    <button th:id="'like-btn-' + ${post.id}"
                            th:onclick="'likePost(' + ${post.id} + ')'">
                        <span th:text="${post.likedByMe} ? '❤️' : '♡'">♡</span> 좋아요
                    </button>
                    <span th:id="'like-count-' + ${post.id}" th:text="${post.likeCount + '명'}">0명</span>
                </div>

                <div class="comments" th:if="${post != null and post.comments != null}">
                    <div class="comment-list">

                        <div th:each="comment : ${post.comments}" th:if="${comment.parentId == null}"
                             class="comment-item"  th:id="'comment-' + ${comment.id}">
                            <!-- ✅ 삭제 버튼과 내용을 같은 줄에 배치 -->
                            <div class="comment-content-wrapper">
                                <div>
                                    <span class="comment-username" th:text="${comment.nickname}"></span>:
                                    <span th:text="${comment.content}"></span>
                                </div>

                                <div class="edit-delete"
                                     th:if="${loggedInUser != null and
                    (loggedInUser.userId == comment.userId or
                     loggedInUser.userId == post.user.id)}">
                                    <form th:action="@{/comment/delete/{id}(id=${comment.id})}" method="post"
                                          style="display:inline;">
                                        <button type="submit" onclick="return confirm('댓글을 삭제하시겠습니까?')">삭제</button>
                                    </form>
                                </div>
                            </div>

                            <form action="/comment/reply" method="post" class="reply-form">

                                    <input type="hidden" name="parentId" th:value="${comment.id}"/>

                                <div class="input-wrapper">
                                    <input type="text" name="content" placeholder="답글 입력..." required/>
                                    <button type="submit" class="inline-btn">답글</button>
                                </div>
                            </form>

                            <div class="reply reply-comment-list">
                                <div th:each="reply, iterStat : ${post.comments}"
                                     th:if="${reply.parentId == comment.id}"
                                     class="reply-item"
                                     th:classappend="${iterStat.index > 0} ? ' hidden' : ''">

                                    <div class="reply-content-wrapper">
                                        <div>
                                            <span class="comment-username" th:text="${reply.nickname}"></span>:
                                            <span th:text="${reply.content}"></span>
                                        </div>

                                        <div class="edit-delete"
                                             th:if="${loggedInUser != null and
              (loggedInUser.userId == reply.userId or
               loggedInUser.userId == post.user.id)}">
                                            <form th:action="@{/comment/delete/{id}(id=${reply.id})}" method="post" style="display:inline;">
                                                <button type="submit" onclick="return confirm('답글을 삭제하시겠습니까?')">삭제</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <button type="button" class="toggle-replies-btn"
                                        onclick="toggleReplies(this)" data-expanded="false">
                                    답글 더보기
                                </button>
                            </div>

                        </div>


                        <th:block th:if="${#lists.size(post.comments) > 1}">
                            <button type="button"
                                    class="toggle-comments-btn"
                                    onclick="toggleComments(this)"
                                    th:attr="data-expanded=false">
                                [[${#lists.size(post.comments) - 1}]]개의 댓글 더보기
                            </button>
                        </th:block>
                    </div>

                    <form action="/comment/add" method="post">
                        <input type="hidden" name="postId" th:value="${post.id}"/>
                        <input type="text" name="content" placeholder="댓글 입력..." required/>
                        <button type="submit">작성</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="layout/uploadModal :: uploadModal"></div>

</body>
</html>
