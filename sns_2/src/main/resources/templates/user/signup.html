<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="회원가입 페이지">
    <meta name="keywords" content="회원가입, 로그인, 유저 등록">
    <meta name="author" content="YourWebsiteName">
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/User.css">
    <script defer src="/js/signup.js"></script> <!-- JavaScript 파일 연결 -->
</head>
<body>

<header>
    <h1>회원가입</h1>
    <nav>
        <ul>
            <li><a href="/">메인페이지</a></li>
            <li><a href="login">로그인</a></li>
        </ul>
    </nav>
</header>

<main>
    <form action="/user/signup" method="post" id="signupForm">

        <!-- 서버에서 전달한 에러 메시지 출력 -->
        <div th:if="${errorMessage}">
            <div class="error-message" th:text="${errorMessage}" style="color: red; margin-bottom: 1em;"></div>
        </div>

        <div>
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required autocomplete="name">
        </div>

        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="new-password">
        </div>

        <div>
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" name="phone" placeholder="전화번호를 입력하세요" required autocomplete="tel">
        </div>

        <div>
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required autocomplete="email">
        </div>

        <button type="submit" class="signup-btn" id="signupButton">회원가입</button>
    </form>

    <div class="login-link">
        <p>계정이 있으신가요?</p>
        <a href="login">로그인</a>
    </div>
</main>

</body>
</html>
